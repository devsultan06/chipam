<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F7F5EF;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #F7F5EF;
            padding-bottom: 40px;
            padding-top: 40px;
        }

        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .banner {
            background-color: #0D1F14;
            padding: 60px 40px;
            text-align: center;
            position: relative;
        }

        /* Logo Layout */
        .logo-container {
            margin-bottom: 24px;
            display: block;
            text-align: center;
        }

        .banner-title {
            color: #ffffff;
            font-size: 35px;
            font-weight: 500;
            margin: 0;
            letter-spacing: 0px;
            line-height: 1.1;
        }

        /* Main Body Content */
        .content {
            padding: 60px 50px;
            text-align: left;
        }

        .greeting {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 24px;
            color: #333333;
        }

        .intro-text {
            font-size: 18px;
            font-weight: 400;
            color: #333333;
            margin-bottom: 12px;
        }

        .message {
            font-size: 18px;
            line-height: 1.6;
            font-weight: 400;
            color: #333333;
            margin-bottom: 40px;
        }

        /* Call to Action Button */
        .button {
            display: inline-block;
            background-color: #1A7A4A;
            border: none;
            color: #ffffff !important;
            padding: 16px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .verification-box {
            background-color: #F7F5EF;
            border: 1px dashed #1A7A4A;
            padding: 24px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 40px;
        }

        .verification-code {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #1A1A1A;
            margin: 0;
            font-family: monospace;
        }

        /* Footer Links and Contact */
        .footer {
            text-align: center;
            padding: 40px 20px;
            background-color: #ffffff;
        }

        .footer p {
            font-size: 15px;
            color: #333333;
            margin: 8px 0;
            font: 400
        }

        .footer-link {
            color: #1A7A4A;
            text-decoration: none;
            font-weight: 600;
        }

        .whatsapp-number {
            font-weight: 600;
        }

        /* Mobile Adjustments */
        @media only screen and (max-width: 600px) {
            .main {
                border-radius: 0;
            }

            .content {
                padding: 40px 25px;
            }

            .banner-title {
                font-size: 30px;
            }

            .logo-text {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <center class="wrapper">
        <table class="main" width="100%" cellpadding="0" cellspacing="0">
            <!-- Banner Section -->
            <tr>
                <td class="banner" bgcolor="#58B947"
                    style="background-color: #58B947; padding: 40px 0; text-align: center;">
                    <!-- Content Table for Banner -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                        <tr>
                            <!-- Center Logo -->
                            <td align="center" valign="middle">
                                <div
                                    style="font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 900; color: #C8F275; letter-spacing: -2px;">
                                    chipam</div>
                            </td>
                        </tr>
                    </table>

                    <h1 class="banner-title"
                        style="color: #ffffff; font-size: 35px; font-weight: 500; margin: 30px 0 0 0; letter-spacing: -1px; line-height: 1.1;">
                        Verify your email
                    </h1>
                </td>
            </tr>
            <!-- Content Section -->
            <tr>
                <td class="content">
                    <p class="greeting">Hi Amaka Obi,</p>

                    <p class="intro-text">Welcome to the future of collection.</p>
                    <p class="message">
                        Please verify your email address to secure your account and start collecting contributions effortlessly.
                    </p>

                    
                        <div class="verification-box">
                            <p
                                style="font-size: 12px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; margin-bottom: 12px;">
                                Your code is:</p>
                            <p class="verification-code">
                                492815
                            </p>
                        </div>
                        
                </td>
            </tr>
            <!-- Footer Section -->
            <tr>
                <td class="footer">
                    <p>Issues? Contact us at
                        <a href="mailto:hello@chipam.com" class="footer-link">hello@chipam.com</a>
                    </p>
                    <p>
                        or chat with us on WhatsApp
                        <span class="whatsapp-number"><a href="https://wa.me/234800CHIPAM" class="footer-link">+234 800
                                CHIPAM</a></span>
                    </p>
                </td>
            </tr>
        </table>
    </center>
</body>

</html>
